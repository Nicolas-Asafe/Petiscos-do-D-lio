<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=remove" />
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petiscos do délio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Triodion&display=swap');

        .content{
            button{
                display: none;
            }
        }
        * {
            margin: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            font-weight: 600;
            background-color: #f1f1f1;
            padding: 10px;
        }

        .cardapio {
            /* margin-top: 10px; */
            /* antes era 50px */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;


            h1 {
                font-size: 50px;
            }

            .Prato:hover {
                transform: scale(0.95);
                background-color: #e0e0e0;
            }

            .Prato {
                animation: 0.3s ease appearprato;
                transition: 0.1s;
                box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.589);
                border: 1px solid #d8d8d8;
                padding: 13px;
                display: flex;
                border-radius: 10px;
                justify-content: space-between;

                .l {
                    display: flex;
                    flex-direction: column;
                    gap: 10px;

                    .NamePrat {
                        font-size: 23px;
                        font-weight: 600;
                    }

                    .Descricao {
                        color: #5c5858;
                    }
                }
            }
        }

        @keyframes appearprato {
            0% {
                opacity: 0;
                transform: translateY(-50%);
            }

            100% {
                opacity: 1;
                transform: translateY(0%);
            }
        }

        nav {
            position: fixed;
            top: 10px;
            /* espaçamento do topo */
            left: 10px;
            right: 10px;
            box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.384);
            z-index: 9999;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #e0e0e0;
            border: 1px solid #d8d8d8;
        }


        @media (max-width: 800px) {
            body {
                padding: 0;
            }

            nav {
                flex-direction: column;
                gap: 10px;
                left: 10px;
                right: 10px;
                width: auto;
                /* garantir que respeite as bordas */

            }

            .cardapio {
                margin-top: 140px;
                /* um pouco mais, pq nav em coluna fica mais alta */

            }

            .tags {
                flex-wrap: wrap;
            }

            .tag {
                padding: 2px 4px;
            }

            .content {
                display: flex;
                justify-content: space-between;
                width: 100%;

                button {
                    border-radius: 50%;
                    border: none;
                    padding: 5px;
                    justify-content: center;
                    align-items: center;
                    display: flex;
                    box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.589);
                    border: 1px solid #d8d8d8;

                }
            }
        }

        .tags {
            display: flex;
            gap: 4px;

            .tag {
                transition: 0.1s;
                font-weight: 600;
                padding: 2px 10px;
                border-radius: 20px;
                background-color: #5c5858;
                border: 1px solid #d8d8d891;
                box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.384);
                color: white;
            }

            .gold {
                color: white;
                background-color: gold;
            }

            .green {
                color: white;
                background-color: rgb(13, 192, 13);
            }

            .red {
                color: white;
                background-color: rgb(212, 88, 88);
            }

            .blue {
                color: white;
                background-color: rgb(212, 93, 172);
            }

            .tag:hover {
                cursor: pointer;
                transform: scale(1.2);
            }

            .hotpink {
                color: white;
                background: rgb(137, 137, 255);
            }
        }
        .hide{
            display: none;
        }
    </style>
</head>

<body>
    <nav>
        <div class="content">
            <h1>Categorias:</h1>
            <button onclick="RemoveContent()">
                <span class="material-symbols-outlined">
                    remove
                </span>
            </button>
        </div>
        <div class="tags">
            <div class="tag" onclick="InitCardapio()">
                Todos
            </div>
            <div class="tag hotpink" onclick="RenderPrat('Carne')">
                Carnes
            </div>
            <div class="tag blue" onclick="RenderPrat('Sobremesas')">
                Sobremesas
            </div>
            <div class="tag red" onclick="RenderPrat('Aves')">
                Aves
            </div>
            <div class="tag gold" onclick="RenderPrat('Especiais')">
                Especiais
            </div>
        </div>
    </nav>
    <div class="cardapio">

    </div>
    <script src="script.js"></script>
</body>

</html>
